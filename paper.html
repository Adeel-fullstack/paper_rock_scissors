<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="paper.css">
</head>
<body>

        <div class="container1">
         <h1>Rock Paper Scissor</h1>
        </div>
         <div class="choices">

            <div class="choice" id="Rock">
            <img src="/.vscode/image.png">
            </div>

            <div class="choice" id="Paper">
                <img src="image.png">
            </div>

            <div class="choice" id="Scissor">
                <img src="/.vscode/download.jpg">
            </div>
         </div>

         <div class="container2">
            <div class="you">
                <p id="para">0</p>
                <label>You</label>
            </div>

            <div class="comp">
                <p id="compt">0</p>
               <label>Comp</label>
            </div>
         </div>

           
        <div class="bttn">
            <button id="btn">Play Your Move</button>
        </div>

        <div class="bttn">
            <button id="reset">New Game</button>
        </div>
<script src="paper.js"></script>
</body>
</html>
